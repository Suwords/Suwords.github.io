<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>编程理想国</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <!-- 设置浏览器图标 -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="https://wugenqiang.gitee.io/notebook/plugin/gitalk.css">
</head>
<body>
  <!-- 定义加载时候的动作 -->
  <div id="app">加载中...</div>
  <script>
      window.$docsify = {
          // 项目名称
          name: '编程理想国',
          // 仓库地址，点击右上角的Github章鱼猫头像会跳转到此地址
          repo: 'https://github.com/Suwords/coderepublic',
          // 侧边栏支持，默认加载的是项目根目录下的_sidebar.md文件
          loadSidebar: false,
          // 导航栏支持，默认加载的是项目根目录下的_navbar.md文件
          loadNavbar: true,
          // 封面支持，默认加载的是项目根目录下的_coverpage.md文件
          coverpage: false,
          // 最大支持渲染的标题层级
          maxLevel: 5,
          // 自定义侧边栏后默认不会再生成目录，设置生成目录的最大层级（建议配置为2-4）
          subMaxLevel: 4,
          // 小屏设备下合并导航栏到侧边栏
          mergeNavbar: true,
      }
  </script>
  <script>
      // 搜索配置(url：https://docsify.js.org/#/zh-cn/plugins?id=%e5%85%a8%e6%96%87%e6%90%9c%e7%b4%a2-search)
      window.$docsify = {
          search: {
              maxAge: 86400000,// 过期时间，单位毫秒，默认一天
              paths: auto,// 注意：仅适用于 paths: 'auto' 模式
              placeholder: '搜索',
              // 支持本地化
              placeholder: {
                  '/zh-cn/': '搜索',
                  '/': 'Type to search'
              },
              noData: '找不到结果',
              depth: 4,
              hideOtherSidebarContent: false,
              namespace: 'Docsify-Guide',
          }
      }
  </script>
  <!-- docsify的js依赖 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <!-- emoji表情支持 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
  <!-- 图片放大缩小支持 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <!-- 搜索功能支持 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!--在所有的代码块上添加一个简单的Click to copy按钮来允许用户从你的文档中轻易地复制代码-->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- 字数统计 -->
  <script src="//unpkg.com/docsify-count/dist/countable.js">
    window.$docsify = {
      count:{
        countable:true,
        fontsize:'0.9em',
        color:'rgb(90,90,90)',
        language:'chinese'
      }
    }
  </script>
  <!-- 回到顶部 -->
  <script src="https://wugenqiang.github.io/CS-Notes/plugin/jquery.js"></script>
  <script src="https://wugenqiang.github.io/CS-Notes/plugin/jquery.goup.js"></script>
  <script type="text/javascript">
    $(document).ready(function () {
      $.goup({
        trigger: 100,
        bottomOffset: 32,
        locationOffset: 32,
        title: 'TOP',
        titleAsText: true
      });
    });
  </script>
  <!-- mouse click -->
  <script src="//cdn.jsdelivr.net/gh/jerryc127/butterfly_cdn@2.1.0/js/click_heart.js"></script>
  <!-- Gitalk 评论系统 -->
  <script src="https://wugenqiang.gitee.io/notebook/plugin/gitalk.js"></script>
  <script src="https://wugenqiang.gitee.io/notebook/plugin/gitalk.min.js"></script>
  <script src="https://wugenqiang.gitee.io/notebook/plugin/md5.min.js"></script>
  <script>
    // title_id需要初始化
    window.title_id = window.location.hash.match(/#(.*?)([?]|$)/) ? window.location.hash.match(/#(.*?)([?]|$)/)[1] : '/';
    const gitalk = new Gitalk({
      clientID: 'ddc7eb04dfa6d5843219',
      clientSecret: '1dd6fe6f7d5d9dbb07cc904ace2b722c682da9d7',
      repo: 'NoteBook',
      owner: 'Suwords',
      admin: ['Suwords'],
      title: decodeURI(window.title_id),
      distractionFreeMode: false,	// 是否添加全屏遮罩
      id: md5(window.location.hash),	// 页面的唯一标识，gitalk 会根据这个标识自动创建的issue的标签,我们使用页面的相对路径作为标识
      enableHotKey: true,	// 提交评论快捷键(cmd/ctrl + enter)
    })
    // 监听URL中hash的变化，如果发现换了一个MD文件，那么刷新页面，解决整个网站使用一个gitalk评论issues的问题。
    window.onhashchange = function (event) {
      if (event.newURL.split('?')[0] !== event.oldURL.split('?')[0]) {
        location.reload()
      }
    }
  </script>

</body>
</html>
